name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-server:
    name: Lint server (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen || uv sync
      - run: uv run ruff check app/
      - run: uv run ruff format --check app/

  lint-web:
    name: Lint and test web (biome + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome check src/
      - run: pnpm test:run
      # NOTE: `pnpm exec tsc -b` is intentionally not run here yet —
      # the project has known TypeScript debt around the Timeline type
      # refactor. Add it back once the type errors are resolved.
