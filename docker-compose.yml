services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: timelines
      POSTGRES_PASSWORD: timelines
      POSTGRES_DB: timelines
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timelines"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://timelines:timelines@db:5432/timelines
      DATABASE_URL_SYNC: postgresql://timelines:timelines@db:5432/timelines
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./server:/app
      - server_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      server:
        condition: service_healthy
    command: pnpm dev --host 0.0.0.0
    restart: unless-stopped

volumes:
  pgdata:
  server_venv:
  web_node_modules:
